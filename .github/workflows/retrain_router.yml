name: retrain-router

# Weekly retrain + eval of the Vanguard Router v2 tier-2 classifier from
# accumulated shadow logs. Opens a PR with the new model.joblib only if
# the Macro F1 on the merged set stays above the gate.
#
# Runs Sunday 19:00 UTC (= Monday 03:00 UTC+8 / 05:00 AEST).

on:
  schedule:
    - cron: "0 19 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn numpy pyyaml pytest

      - name: Download last week's shadow logs
        uses: actions/download-artifact@v4
        with:
          name: router-shadow-logs
          path: router_v2/training/data/
        continue-on-error: true

      - name: Build labelled set
        run: |
          mkdir -p router_v2/training/data
          python router_v2/training/build_labelled_set.py \
              --logs 'router_v2/training/data/*.jsonl' \
              --seeds router_v2/training/seeds_zh.jsonl \
              --out   router_v2/training/data/merged.jsonl

      - name: Train candidate
        run: |
          python router_v2/training/train_tier2.py \
              --data router_v2/training/data/merged.jsonl \
              --out  router_v2/policies/router/model.joblib.candidate

      - name: Evaluate candidate
        id: eval
        run: |
          python router_v2/training/router_eval.py \
              --data router_v2/training/data/merged.jsonl \
              --dump-csv router_v2/training/data/eval_candidate.csv \
              | tee /tmp/eval.txt
          python - <<'PY'
          import json
          import re
          out = open('/tmp/eval.txt').read()
          m = re.search(r'Macro F1\s*:\s*([0-9.]+)', out)
          f1 = float(m.group(1)) if m else 0.0
          json.dump({'macro_f1': f1}, open('/tmp/metrics.json', 'w'))
          print(f'macro_f1={f1}')
          PY

      - name: Gate on Macro F1 >= 0.71 (non-regression vs baseline)
        run: |
          python - <<'PY'
          import json
          import sys
          m = json.load(open('/tmp/metrics.json'))
          # 0.71 is one point below the shipped 0.83 baseline; we only
          # block when the retrain would make things materially worse.
          if m['macro_f1'] < 0.71:
              print(f"F1={m['macro_f1']:.3f} < 0.71, refusing to promote")
              sys.exit(1)
          print(f"F1={m['macro_f1']:.3f} OK")
          PY

      - name: Promote candidate
        run: |
          mv router_v2/policies/router/model.joblib.candidate \
             router_v2/policies/router/model.joblib

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: router/weekly-retrain
          title: "chore(router): weekly retrain"
          commit-message: "chore(router): weekly retrain"
          body: |
            Automated weekly retrain of Vanguard Router v2 tier-2 classifier.

            * Training data: last-7-day shadow logs + static seeds
            * Metrics: see workflow logs (`macro_f1` gated at 0.71)
            * Diff: `router_v2/policies/router/model.joblib`
          labels: |
            router
            automation
