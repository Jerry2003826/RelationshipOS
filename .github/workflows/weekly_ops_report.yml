name: weekly-ops-report

# Weekly ops report for RelationshipOS. Aggregates last 7 days of shadow
# logs + silver labels + latest retrain Macro F1 and opens a PR with the
# rendered Markdown at reports/ops_YYYY-WW.md.
#
# Runs Monday 02:00 UTC (= 10:00 UTC+8 / 12:00 AEST).

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install litellm pytest

      - name: Download shadow logs
        uses: actions/download-artifact@v4
        with:
          name: router-shadow-logs
          path: router_v2/training/data/
        continue-on-error: true

      - name: Assemble inputs
        run: |
          set -e
          shopt -s nullglob
          files=(router_v2/training/data/*.jsonl)
          if [ ${#files[@]} -gt 0 ]; then
            cat "${files[@]}" > /tmp/shadow_merged.jsonl
          else
            : > /tmp/shadow_merged.jsonl
          fi
          if [ -f router_v2/training/data/silver_labels.jsonl ]; then
            cp router_v2/training/data/silver_labels.jsonl /tmp/silver.jsonl
          else
            : > /tmp/silver.jsonl
          fi
          if [ -f /tmp/metrics.json ]; then
            cp /tmp/metrics.json /tmp/metrics_input.json
          fi

      - name: Render report
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python scripts/weekly_ops_report.py \
            --shadow /tmp/shadow_merged.jsonl \
            --silver /tmp/silver.jsonl \
            --narrative \
            --model "${ROUTER_NARRATIVE_MODEL:-deepseek-reasoner}"

      - name: Open PR with report
        uses: peter-evans/create-pull-request@v6
        with:
          branch: reports/weekly-ops
          title: "chore(reports): weekly ops report"
          commit-message: "chore(reports): weekly ops report"
          body: |
            Automated weekly ops report.

            * Route distribution, silver conversion, retrain health
            * LLM narrative generated by `ROUTER_NARRATIVE_MODEL`
              (default `deepseek-reasoner`, one call per week)
          labels: |
            reports
            automation
