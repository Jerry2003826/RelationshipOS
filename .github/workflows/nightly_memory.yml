name: nightly-memory-compress

# Nightly run of scripts/nightly_memory_compress.py over the last 24h
# of shadow logs, producing memory/compressed_YYYYMMDD.jsonl.
#
# Runs 18:00 UTC (= 02:00 UTC+8 / 04:00 AEST) when user traffic is low.

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  compress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install litellm pyyaml pytest

      - name: Download last-24h shadow logs
        uses: actions/download-artifact@v4
        with:
          name: router-shadow-logs
          path: router_v2/training/data/
        continue-on-error: true

      - name: Dry-run group summary
        run: |
          shopt -s nullglob
          for f in router_v2/training/data/*.jsonl; do
            python scripts/nightly_memory_compress.py \
              --input "$f" --dry-run || true
          done

      - name: Compress
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ROUTER_MEMORY_MODEL: ${{ vars.ROUTER_MEMORY_MODEL || 'deepseek-chat' }}
        run: |
          set -e
          mkdir -p memory
          shopt -s nullglob
          files=(router_v2/training/data/*.jsonl)
          if [ ${#files[@]} -eq 0 ]; then
            echo "no shadow logs found, skipping"
            exit 0
          fi
          # Merge all shadow files into a single stream.
          cat "${files[@]}" > /tmp/shadow_merged.jsonl
          python scripts/nightly_memory_compress.py \
            --input /tmp/shadow_merged.jsonl \
            --window-hours 24

      - name: Open PR with new cards
        uses: peter-evans/create-pull-request@v6
        with:
          branch: memory/nightly-compress
          title: "chore(memory): nightly compressed cards"
          commit-message: "chore(memory): nightly compressed cards"
          body: |
            Automated nightly memory compression.

            * Source: last-24h shadow logs
            * Model: `ROUTER_MEMORY_MODEL` (default `deepseek-chat`)
            * Output: `memory/compressed_YYYYMMDD.jsonl`
          labels: |
            memory
            automation
