# Entity lexicon (zh).
# Named-entity seeds that are useful *only* as features, not as hard
# rules. Presence of entities correlates with LIGHT_RECALL (the user is
# referencing something concrete the AI should anchor to) or with
# factual queries when combined with a 是什么-style interrogative.

version: 1
language: zh
