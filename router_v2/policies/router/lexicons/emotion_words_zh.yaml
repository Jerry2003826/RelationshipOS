# Emotion-intensity lexicon (zh).
# Weight reflects the magnitude of emotional load, not valence.
# A negation ("不累") multiplies the matched weight by -0.6 downstream.
#
# Seeds: DLUT 情感词汇本体 + HowNet sentiment + hand-curated for
# friend-chat register. Do NOT include bland words like "好" here.

version: 1
language: zh
entries:
  # --- high-intensity distress / crisis ---------------------------------
  - {form: "崩溃",       weight: 0.95}
  - {form: "绝望",       weight: 0.95}
  - {form: "撑不住",     weight: 0.90}
  - {form: "活不下去",   weight: 1.00}
  - {form: "想死",       weight: 1.00}
  - {form: "想消失",     weight: 0.95}
  - {form: "没意思",     weight: 0.70}   # ambiguous; downweight
  - {form: "不想活",     weight: 1.00}

  # --- moderate negative -------------------------------------------------
  - {form: "难过",       weight: 0.70}
  - {form: "伤心",       weight: 0.75}
