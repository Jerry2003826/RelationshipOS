# Conversation-continuity lexicon (zh).
# Positive signal for LIGHT_RECALL: the user is updating the AI on
# events or referring to something the AI already knows, but is NOT
# asking for analysis. This bucket catches the "casual update / shared
# history" register that competes with DEEP_THINK's planning register.

version: 1
language: zh
entries:
  # update / status markers
  - {form: "又",           weight: 0.40}
  - {form: "终于",         weight: 0.55}
  - {form: "刚",           weight: 0.35}
  - {form: "刚才",         weight: 0.35}
  - {form: "刚刚",         weight: 0.45}
  - {form: "今天又",       weight: 0.75}
  - {form: "今天终于",     weight: 0.80}
  - {form: "又开始",       weight: 0.65}
  - {form: "还是",         weight: 0.30}
  - {form: "又一次",       weight: 0.70}
  - {form: "再一次",       weight: 0.65}

  # outcome / resolution markers
  - {form: "搞定了",       weight: 0.75}
  - {form: "办好了",       weight: 0.75}
  - {form: "办成了",       weight: 0.75}
  - {form: "做完了",       weight: 0.70}
  - {form: "搞砸了",       weight: 0.70}
  - {form: "弄丢了",       weight: 0.65}
  - {form: "没过",         weight: 0.55}
  - {form: "过了",         weight: 0.50}
  - {form: "拿到了",       weight: 0.70}
  - {form: "拒了",         weight: 0.60}
  - {form: "吹了",         weight: 0.65}
  - {form: "拖着",         weight: 0.55}
  - {form: "没成",         weight: 0.65}
  - {form: "成了",         weight: 0.55}

  # event anchors
  - {form: "刚下班",       weight: 0.85}
  - {form: "刚起床",       weight: 0.75}
  - {form: "刚到家",       weight: 0.80}
  - {form: "到家了",       weight: 0.75}
  - {form: "落地了",       weight: 0.85}
  - {form: "在机场",       weight: 0.80}
  - {form: "回家路上",     weight: 0.80}
  - {form: "面试完",       weight: 0.85}
  - {form: "面试了",       weight: 0.80}
  - {form: "开完会",       weight: 0.80}
  - {form: "开完",         weight: 0.65}
  - {form: "考完",         weight: 0.80}
  - {form: "打完针",       weight: 0.80}
  - {form: "做完体检",     weight: 0.85}
  - {form: "体检结果",     weight: 0.85}

  # reply-to-prior-advice markers (very strong)
  - {form: "按你说的",     weight: 0.95}
  - {form: "按照你说的",   weight: 0.95}
  - {form: "听了你的",     weight: 0.95}
  - {form: "采纳了你",     weight: 0.95}
  - {form: "照你之前说",   weight: 0.95}
  - {form: "你上次说的",   weight: 0.90}
  - {form: "你之前让我",   weight: 0.90}
  - {form: "你说过要",     weight: 0.90}
  - {form: "你建议的",     weight: 0.85}
  - {form: "没听你",       weight: 0.85}
  - {form: "当时没听",     weight: 0.85}
  - {form: "你预言",       weight: 0.85}
  - {form: "被你说中",     weight: 0.90}
  - {form: "你真的懂",     weight: 0.70}
  - {form: "还是你懂我",   weight: 0.85}
  - {form: "多亏你",       weight: 0.80}
  - {form: "幸亏有你",     weight: 0.80}

  # relational / bond markers
  - {form: "咱俩",         weight: 0.60}
  - {form: "我们之间",     weight: 0.70}
  - {form: "认识多久",     weight: 0.80}
  - {form: "还会记得我",   weight: 0.90}
  - {form: "还认得我",     weight: 0.85}

  # sharing intent (short-form, not a deep request)
  - {form: "跟你说",       weight: 0.45}
  - {form: "告诉你",       weight: 0.45}
  - {form: "给你讲",       weight: 0.55}
  - {form: "跟你分享",     weight: 0.70}
  - {form: "讲个好玩的",   weight: 0.65}
