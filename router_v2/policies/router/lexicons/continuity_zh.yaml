  - {form: "想吃",         weight: 0.45}
  - {form: "需要一个拥抱", weight: 0.75}
  - {form: "想被",         weight: 0.55}
  - {form: "煎糊",         weight: 0.75}
  - {form: "寄来的",       weight: 0.75}
