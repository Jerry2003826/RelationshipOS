  - {form: "今天",         weight: 0.30}
  - {form: "刚才又",       weight: 0.75}
  - {form: "加班到",       weight: 0.75}
  - {form: "今晚",         weight: 0.35}
  - {form: "到现在",       weight: 0.40}

  # casual outcome verbs (abbreviated)
  - {form: "搞定",         weight: 0.60}
  - {form: "投了",         weight: 0.55}
  - {form: "读完",         weight: 0.60}
  - {form: "看完",         weight: 0.55}
  - {form: "买到了",       weight: 0.70}
  - {form: "买了",         weight: 0.45}
  - {form: "涨工资",       weight: 0.80}
  - {form: "拿到",         weight: 0.55}
  - {form: "签了",         weight: 0.65}
  - {form: "搬进",         weight: 0.75}
  - {form: "搬家",         weight: 0.70}
  - {form: "上线了",       weight: 0.75}
  - {form: "破戒",         weight: 0.80}
  - {form: "冷战",         weight: 0.75}
  - {form: "请假",         weight: 0.55}
  - {form: "咨询了",       weight: 0.75}
